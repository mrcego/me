name: Redirect GitHub Pages to cesargomez.dev

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare redirect artifact
        run: |
          mkdir -p .gh-pages
          cp redirect/gh-pages/index.html .gh-pages/index.html
          cp redirect/gh-pages/404.html .gh-pages/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .gh-pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Check GitHub Pages availability
        id: pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh api "repos/${{ github.repository }}/pages" >/dev/null 2>&1; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::GitHub Pages is unavailable for this repository (private repos need GitHub Pro, or make the repo public). Skipping legacy redirect deploy. Netlify remains the production host."
          fi

      - name: Deploy redirect to GitHub Pages
        id: deployment
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/deploy-pages@v5
