# Nuxt 4 portfolio — primary host: https://cesargomez.dev

[build]
  command = "pnpm run generate:netlify"
  # nuxt generate writes the full static site here (dist/_nuxt can be stale — do not publish dist)
  publish = ".output/public"

[build.environment]
  NODE_VERSION = "24"
  NUXT_PUBLIC_CONTACT_PROVIDER = "netlify"

[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true

[dev]
  command = "pnpm dev"
  targetPort = 3000
  port = 8888
  framework = "#auto"

[[redirects]]
  from = "https://www.cesargomez.dev/*"
  to = "https://cesargomez.dev/:splat"
  status = 301
  force = true

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/200.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    # Fully self-hosted static site (fonts under /_fonts, own images, no third-party scripts).
    # 'unsafe-inline' is limited to scripts/styles because Nuxt emits an inline bootstrap
    # (window.__NUXT__.config with a per-build buildId) and inlines critical CSS.
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data:; font-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self'; manifest-src 'self'; upgrade-insecure-requests"

[[headers]]
  for = "/_nuxt/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_i18n/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_ipx/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon-16x16.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon-32x32.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/apple-touch-icon.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

# pretty_urls would otherwise turn /sitemap.xml into an HTML refresh page
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap_index.xml"
  status = 200
  force = true

# Legacy CV filenames (spaces) → kebab-case
[[redirects]]
  from = "/cv/CV Cesar Gomez EN.pdf"
  to = "/cv/cv-cesar-gomez-en.pdf"
  status = 301

[[redirects]]
  from = "/cv/CV Cesar Gomez ES.pdf"
  to = "/cv/cv-cesar-gomez-es.pdf"
  status = 301
