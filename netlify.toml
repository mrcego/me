# Nuxt 4 portfolio — primary host: https://cesargomez.dev

[build]
  command = "pnpm run generate"
  # Nitro netlify-static preset writes here during Netlify builds (not .output/public)
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NUXT_PUBLIC_CONTACT_PROVIDER = "netlify"

[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true

[dev]
  command = "pnpm dev"
  targetPort = 3000
  port = 8888
  framework = "#auto"

[[redirects]]
  from = "https://www.cesargomez.dev/*"
  to = "https://cesargomez.dev/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/_nuxt/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"
