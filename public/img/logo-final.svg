<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="subtle-shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <g filter="url(#subtle-shadow)">
    <!-- Outer square rotated -->
    <rect x="8" y="8" width="32" height="32" rx="8" 
          fill="currentColor" stroke="#58a6ff" stroke-width="1" opacity="0.1" transform="rotate(45 24 24)"/>
    
    <!-- Letter C - clean and bold -->
    <path d="M 16 24 
             C 16 19, 19 16, 23 16
             C 26 16, 28 17.5, 28 19
             L 26 19
             C 26 18, 25 17.5, 23 17.5
             C 20 17.5, 18 20, 18 24
             C 18 28, 20 30.5, 23 30.5
             C 25 30.5, 26 30, 26 29
             L 28 29
             C 28 30.5, 26 32, 23 32
             C 19 32, 16 29, 16 24 Z" 
          fill="#58a6ff"/>
    
    <!-- Letter G - integrated elegantly -->
    <path d="M 28 24
             C 28 21, 29.5 19.5, 32 19.5
             C 34 19.5, 35.5 21, 35.5 23
             C 35.5 24.5, 34.5 25.5, 33 25.5
             L 31.5 25.5
             M 31.5 25.5
             C 30 25.5, 29 24.5, 29 23
             C 29 21.5, 30 20.5, 32 20.5
             C 33 20.5, 33.5 21.5, 33.5 22
             M 30 29
             L 33 29
             C 34 29, 34.5 28.5, 34.5 27.5
             C 34.5 26.5, 34 26, 33 26" 
          fill="none" 
          stroke="#ffffff" 
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
          opacity="0.8"/>
    
    <!-- Center dot -->
    <circle cx="24" cy="24" r="1.5" fill="#58a6ff" opacity="0.6"/>
  </g>
  
  <!-- Corner accents -->
  <g opacity="0.4">
    <circle cx="12" cy="12" r="0.5" fill="#58a6ff"/>
    <circle cx="36" cy="12" r="0.5" fill="#58a6ff"/>
    <circle cx="12" cy="36" r="0.5" fill="#58a6ff"/>
    <circle cx="36" cy="36" r="0.5" fill="#58a6ff"/>
  </g>
</svg>
