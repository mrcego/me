<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#030612"/>
  
  <!-- Grid Pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 75, 92, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Gradient Glow -->
  <circle cx="200" cy="150" r="300" fill="url(#glow)" opacity="0.3"/>
  <defs>
    <radialGradient id="glow">
      <stop offset="0%" stop-color="#ff4b5c" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff4b5c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Main Text -->
  <text x="100" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="900" fill="white" letter-spacing="-0.02em">
    CÉSAR GÓMEZ
  </text>
  
  <!-- Subtitle -->
  <text x="100" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="600" fill="#94a3b8">
    Senior Fullstack Developer
  </text>
  
  <!-- Description -->
  <text x="100" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="500" fill="#64748b">
    13+ years specializing in Frontend Excellence
  </text>
  
  <!-- Tech Stack -->
  <g transform="translate(100, 420)">
    <rect width="120" height="40" rx="20" fill="rgba(255, 75, 92, 0.1)" stroke="#ff4b5c" stroke-width="2"/>
    <text x="60" y="26" font-family="system-ui" font-size="16" font-weight="700" fill="#ff4b5c" text-anchor="middle">
      Vue.js
    </text>
  </g>
  
  <g transform="translate(240, 420)">
    <rect width="120" height="40" rx="20" fill="rgba(255, 75, 92, 0.1)" stroke="#ff4b5c" stroke-width="2"/>
    <text x="60" y="26" font-family="system-ui" font-size="16" font-weight="700" fill="#ff4b5c" text-anchor="middle">
      Nuxt.js
    </text>
  </g>
  
  <g transform="translate(380, 420)">
    <rect width="140" height="40" rx="20" fill="rgba(255, 75, 92, 0.1)" stroke="#ff4b5c" stroke-width="2"/>
    <text x="70" y="26" font-family="system-ui" font-size="16" font-weight="700" fill="#ff4b5c" text-anchor="middle">
      TypeScript
    </text>
  </g>
  
  <!-- Accent Line -->
  <line x1="100" y1="520" x2="520" y2="520" stroke="#ff4b5c" stroke-width="3" opacity="0.5"/>
  
  <!-- Footer -->
  <text x="100" y="570" font-family="system-ui" font-size="18" font-weight="600" fill="#475569">
    cesargomez.dev
  </text>
</svg>
